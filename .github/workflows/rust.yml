name: Rust

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Pure-Rust transcode: no libtesseract / leptonica / clang at build time.
    # tesseract-core path-deps lance-graph-contract; tesseract-recognizer
    # path-deps ndarray (the int8 SIMD GEMM compute foundation). Check all three
    # out side by side so the ../../../lance-graph and ../../../ndarray path deps
    # resolve.
    - uses: actions/checkout@v4
      with:
        path: tesseract-rs
    - uses: actions/checkout@v4
      with:
        repository: AdaWorldAPI/lance-graph
        path: lance-graph
    - uses: actions/checkout@v4
      with:
        repository: AdaWorldAPI/ndarray
        path: ndarray
    - uses: actions/checkout@v4
      with:
        repository: AdaWorldAPI/OGAR
        path: OGAR
    # ndarray declares rust-version = 1.95; bump the toolchain to satisfy it.
    - name: Rust 1.95 toolchain
      run: rustup toolchain install 1.95 --profile minimal --component clippy --component rustfmt && rustup default 1.95
    - name: Build (core)
      working-directory: tesseract-rs
      run: cargo build -p tesseract-core --verbose
    - name: Test (core)
      working-directory: tesseract-rs
      run: cargo test -p tesseract-core --verbose
    - name: Clippy (core)
      working-directory: tesseract-rs
      run: cargo clippy -p tesseract-core --all-targets -- -D warnings
    - name: Build (recognizer)
      working-directory: tesseract-rs
      run: cargo build -p tesseract-recognizer --verbose
    - name: Test (recognizer)
      working-directory: tesseract-rs
      run: cargo test -p tesseract-recognizer --verbose
    - name: Clippy (recognizer)
      working-directory: tesseract-rs
      run: cargo clippy -p tesseract-recognizer --all-targets -- -D warnings
    - name: Check formatting
      # SCOPED to -p (NOT --all): the path deps would walk into the sibling
      # lance-graph / ndarray workspaces.
      working-directory: tesseract-rs
      run: |
        cargo fmt -p tesseract-core -- --check
        cargo fmt -p tesseract-recognizer -- --check
