name: Rust

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Pure-Rust transcode: no libtesseract / leptonica / clang. The OCR core
    # depends on lance-graph-contract via a sibling path dep, so check both repos
    # out side by side (the path is ../../../lance-graph/crates/lance-graph-contract).
    - uses: actions/checkout@v4
      with:
        path: tesseract-rs
    - uses: actions/checkout@v4
      with:
        repository: AdaWorldAPI/lance-graph
        path: lance-graph
    - name: Build
      working-directory: tesseract-rs
      run: cargo build -p tesseract-core --verbose
    - name: Test
      working-directory: tesseract-rs
      run: cargo test -p tesseract-core --verbose
    - name: Clippy
      working-directory: tesseract-rs
      run: cargo clippy -p tesseract-core --all-targets -- -D warnings
    - name: Check formatting
      # SCOPED to -p (NOT --all): tesseract-core path-deps lance-graph-contract,
      # and `cargo fmt --all` would walk into the lance-graph workspace.
      working-directory: tesseract-rs
      run: cargo fmt -p tesseract-core -- --check
