<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OCR result — tesseract-rs</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    line-height: 1.5; margin: 0; padding: 2rem 1rem;
    background: Canvas; color: CanvasText;
  }
  main { max-width: 48rem; margin: 0 auto; }
  h1 { font-size: 1.4rem; margin: 0 0 1rem; }
  a { color: #2563eb; }
  .stats { display: flex; flex-wrap: wrap; gap: .5rem 1.5rem; margin: 0 0 1.25rem; padding: 0; list-style: none; }
  .stats li { font-size: .9rem; }
  .stats b { font-variant-numeric: tabular-nums; }
  .actions { margin: 1rem 0 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn {
    display: inline-block; padding: .55rem 1rem; border-radius: 8px;
    font-weight: 600; text-decoration: none;
  }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-secondary {
    border: 1px solid color-mix(in srgb, CanvasText 30%, Canvas); color: CanvasText;
  }
  pre {
    border: 1px solid color-mix(in srgb, CanvasText 20%, Canvas);
    border-radius: 10px; padding: 1rem; overflow-x: auto;
    white-space: pre-wrap; word-break: break-word;
    background: color-mix(in srgb, CanvasText 4%, Canvas);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .95rem;
  }
  .empty { color: color-mix(in srgb, CanvasText 55%, Canvas); font-style: italic; }
</style>
</head>
<body>
<main>
  <h1>OCR result</h1>

  <ul class="stats">
    <li>Image: <b>{{ width }}&times;{{ height }}</b> px</li>
    <li>Characters: <b>{{ char_count }}</b></li>
    <li>Lines: <b>{{ line_count }}</b></li>
    <li>Recognition: <b>{{ elapsed_ms }}</b> ms</li>
  </ul>

  <div class="actions">
    <a class="btn btn-primary" href="{{ download_datauri }}" download="ocr.txt">Download .txt</a>
    <a class="btn btn-secondary" href="/">Scan another</a>
  </div>

  {% if text.is_empty() %}
  <p class="empty">(no text recognized)</p>
  {% else %}
  <pre>{{ text }}</pre>
  {% endif %}
</main>
</body>
</html>
